name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"  # history commits from the bot shouldn't trigger CI
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --ignore=check_creds.py